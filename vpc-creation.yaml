AWSTemplateFormatVersion: "2010-09-09"
Description: Visal VPC Creation

Parameters:
  VPCCIDR:
    Type: String
    Description: VPC CIDR Range is Specified

  webSubnetAZ1CIDR:
    Type: String

Resources:
  VisalVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock:
        Ref: VPCCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: VisalVPC

  webSubnetAZ1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: VisalVPC
      CidrBlock:
        Ref: webSubnetAZ1CIDR
      AvailabilityZone:
        Fn::Select:
          - 0
          - Fn::GetAZs:
      Tags:
        - Key: Name
          Value: webSubnetAZ1

  webSubnetAZ2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !
        Ref: VisalVPC
      CidrBlock: 10.1.0.128/25
      AvailabilityZone:
        Fn::Select:
          - 1
          - Fn::GetAZs:
      Tags:
        - Key: Name
          Value: webSubnetAZ2

  webSubnetAZ3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: VisalVPC
      CidrBlock: 10.1.1.0/25
      AvailabilityZone:
        Fn::Select:
          - 2
          - Fn::GetAZs:
      Tags:
        - Key: Name
          Value: webSubnetAZ3

  appSubnetAZ1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: VisalVPC
      CidrBlock: 10.1.1.128/25
      AvailabilityZone:
        Fn::Select:
          - 0
          - Fn::GetAZs:
      Tags:
        - Key: Name
          Value: appSubnetAZ1

  appSubnetAZ2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: VisalVPC
      CidrBlock: 10.1.2.0/25
      AvailabilityZone:
        Fn::Select:
          - 1
          - Fn::GetAZs:
      Tags:
        - Key: Name
          Value: appSubnetAZ2

  appSubnetAZ3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: VisalVPC
      CidrBlock: 10.1.2.128/25
      AvailabilityZone:
        Fn::Select:
          - 2
          - Fn::GetAZs:
      Tags:
        - Key: Name
          Value: appSubnetAZ3

  dataSubnetAZ1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: VisalVPC
      CidrBlock: 10.1.3.0/25
      AvailabilityZone:
        Fn::Select:
          - 0
          - Fn::GetAZs:
      Tags:
        - Key: Name
          Value: dataSubnetAZ1

  dataSubnetAZ2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: VisalVPC
      CidrBlock: 10.1.3.128/26
      AvailabilityZone:
        Fn::Select:
          - 1
          - Fn::GetAZs:
      Tags:
        - Key: Name
          Value: dataSubnetAZ2

  dataSubnetAZ3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId:
        Ref: VisalVPC
      CidrBlock: 10.1.3.192/26
      AvailabilityZone:
        Fn::Select:
          - 2
          - Fn::GetAZs:
      Tags:
        - Key: Name
          Value: dataSubnetAZ3

  publicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId:
        Ref: VisalVPC
      Tags:
        - Key: Name
          Value: publicRouteTable

  privateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId:
        Ref: VisalVPC
      Tags:
        - Key: Name
          Value: privateRouteTable

  dataRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId:
        Ref: VisalVPC
      Tags:
        - Key: Name
          Value: dataRouteTable

  #Public Subnet Route table association #

  publicSubnetAssociationAZ1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: webSubnetAZ1
      RouteTableId:
        Ref: publicRouteTable

  publicSubnetAssociationAZ2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: webSubnetAZ2
      RouteTableId:
        Ref: publicRouteTable

  publicSubnetAssociationAZ3:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: webSubnetAZ3
      RouteTableId:
        Ref: publicRouteTable

  #Private Subnet Route table association #

  privateSubnetAssociationAZ1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: appSubnetAZ1
      RouteTableId:
        Ref: privateRouteTable

  privateSubnetAssociationAZ2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: appSubnetAZ2
      RouteTableId:
        Ref: privateRouteTable

  privateSubnetAssociationAZ3:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: appSubnetAZ3
      RouteTableId:
        Ref: privateRouteTable

  #Data Subnet Route table association #

  dataSubnetAssociationAZ1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: dataSubnetAZ1
      RouteTableId:
        Ref: dataRouteTable

  dataSubnetAssociationAZ2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: dataSubnetAZ2
      RouteTableId:
        Ref: dataRouteTable

  dataSubnetAssociationAZ3:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId:
        Ref: dataSubnetAZ3
      RouteTableId:
        Ref: dataRouteTable

  # Create an NACL for public Network

  publicNACL:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId:
        Ref: VisalVPC
      Tags:
        - Key: Name
          Value: publicNACL

  publicInboundHTTPSRule:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId:
        Ref: publicNACL
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 80
        To: 80

  publicOutboundHTTPSRule:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId:
        Ref: publicNACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0

  # public subnet NACL Association
  publicSubnetNACLAssociationAZ1:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId:
        Ref: webSubnetAZ1
      NetworkAclId:
        Ref: publicNACL

  publicSubnetNACLAssociationAZ2:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId:
        Ref: webSubnetAZ2
      NetworkAclId:
        Ref: publicNACL

  publicSubnetNACLAssociationAZ3:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId:
        Ref: webSubnetAZ3
      NetworkAclId:
        Ref: publicNACL

  # Create an NACL for private network

  privateNACL:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId:
        Ref: VisalVPC
      Tags:
        - Key: Name
          Value: privateNACL

  privateInboundRule:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId:
        Ref: privateNACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: false
      CidrBlock: 10.1.0.0/22

  privateOutboundRule:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId:
        Ref: privateNACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0

  # create an Nacl associated with private Subnet

  privateSubnetNACLAssociationAZ1:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId:
        Ref: appSubnetAZ1
      NetworkAclId:
        Ref: privateNACL

  privateSubnetNACLAssociationAZ2:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId:
        Ref: appSubnetAZ2
      NetworkAclId:
        Ref: privateNACL

  privateSubnetNACLAssociationAZ3:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !
        Ref: appSubnetAZ3
      NetworkAclId:
        Ref: privateNACL

  # create an NACL for Data Network

  dataNACL:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId:
        Ref: VisalVPC
      Tags:
        - Key: Name
          Value: dataNACL

  DataInboundRuleAZ1:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId:
        Ref: dataNACL
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 10.1.2.0/24
      #my sql
      PortRange:
        From: 3306
        To: 3306

  DataOutboundRule:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId:
        Ref: dataNACL
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: true
      CidrBlock: 10.1.0.0/22

      PortRange:
        From: 1024
        To: 65535

  # create an NACl associated with data subnet

  dataSubnetNACLAssociationAZ1:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId:
        Ref: dataSubnetAZ1
      NetworkAclId:
        Ref: dataNACL

  dataSubnetNACLAssociationAZ2:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId:
        Ref: dataSubnetAZ2
      NetworkAclId:
        Ref: dataNACL

  dataSubnetNACLAssociationAZ3:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId:
        Ref: dataSubnetAZ3
      NetworkAclId:
        Ref: dataNACL

Outputs:
  VpcId:
    Description: VPC ID
    Value:
      Ref: VisalVPC
    Export:
      Name: VisalVPCId

  websnaz1SubnetId:
    Description: Subnet ID for websnaz1
    Value:
      Ref: webSubnetAZ1
    Export:
      Name: webSubnetAZ1SubnetId

  websnaz2SubnetId:
    Description: Subnet ID for websnaz2
    Value: 
      Ref: webSubnetAZ2
    Export:
      Name: webSubnetAZ2SubnetId

  websnaz3SubnetId:
    Description: Subnet ID for websnaz3
    Value:
      Ref: webSubnetAZ3
    Export:
      Name: webSubnetAZ3SubnetId
