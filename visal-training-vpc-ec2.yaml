  #     Policies:
  #       - PolicyName: CloudFormationSignalPolicy
  #         PolicyDocument:
  #           Version: "2012-10-17"
  #           Statement:
  #             - Effect: Allow
  #               Action:
  #                 - cloudformation:DescribeStackResource
  #                 - cloudformation:SignalResource
  #               Resource: "*"
  #     Tags:
  #       - Key: Name
  #         Value:
  #           Fn::Sub: ${AWS::StackName}-instance-role
