---
AWSTemplateFormatVersion: "2010-09-09"
Description: Simple EC2 instance stack

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Workload Identity
        Parameters:
          - Owner
          - Environment
          - InstanceName
          - Application
          - CostCenter
      - Label:
          default: Compute Settings
        Parameters:
          - Tenancy
          - KeyName
          - ImageId
          - RootVolumeSize
      - Label:
          default: Network Settings
        Parameters:
          - SubnetExportNames
          - PreferredSubnetIndex
          - SshCidr
      - Label:
          default: Optional Features
        Parameters:
          - EnableMonitoring
          - CreateBackupResources
          #- CreateInstanceRole
      - Label:
          default: Optional Input
        Parameters:
          - NestedStackTemplateUrl
          - EnableNestedStackExample
          - CustomResourceServiceToken
          - EnableCustomResourceExample
    ParameterLabels:
      Owner:
        default: Owner Tag Value
      InstanceName:
        default: EC2 Name Prefix
      Environment:
        default: Use Environment
      Application:
        default: Application Name
      CostCenter:
        default: Cost Center
      Tenancy:
        default: EC2 Tenancy
      KeyName:
        default: EC2 Key Pair
      ImageId:
        default: AMI from Public SSM Parameter
      RootVolumeSize:
        default: Root Volume Size (GiB)
      SubnetExportNames:
        default: Export Names for Candidate Subnets
      PreferredSubnetIndex:
        default: Selected Subnet Index
      SshCidr:
        default: SSH CIDR Range
      CreateBackupResources:
        default: Create BackUp Example
      # CreateInstanceRole:
      #   default: Create IAM Role / Instance Profile
      NestedStackTemplateUrl:
        default: Nested Stack Template URL
      EnableNestedStackExample:
        default: Enable Nested Stack Example
      CustomResourceServiceToken:
        default: Custom Resource Lambda ARN
      EnableCustomResourceExample:
        default: Enable Custom Resource Example

Parameters:
  Owner:
    Type: String
    Default: platform
    Description: Owner tag applied to created resources.

  InstanceName:
    Type: String
    Default: simple-visal-ec2
    AllowedPattern: "^[a-z][a-z0-9-]{2,24}$"
    ConstraintDescription: Use 3-25 lowercase, numbers, hyphens, starting with a letter
    MinLength: 3
    MaxLength: 25
    Description: Name tag for the EC2 instance.

  RootVolumeSize:
    Type: Number
    Default: 8
    MinValue: 8
    MaxValue: 30

  Application:
    Type: String
    Default: training-web
    AllowedPattern: '^[a-z][a-z0-9-]{2,20}$'
    ConstraintDescription: Use 3-21 lowercase letters, numbers, or hyphens, starting with a letter.
    MinLength: 3
    MaxLength: 21
    Description: Application tag and workload identifier.

  CostCenter:
    Type: String
    Default: ac-1001
    AllowedPattern: '^ac-[0-9]{4}$'
    ConstraintDescription: CostCenter must match the format ac-1234.
    MinLength: 7
    MaxLength: 7
    Description: Cost center tag often required by SCP or budget controls.

  EnableMonitoring:
    Type: String
    Default: false
    AllowedValues:
      - "true"
      - "false"

  Environment:
    Type: String
    Default: Dev
    AllowedValues:
      - Prod
      - Test
      - Dev

  CreateBackupResources:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: BackUp Production resources based on the rules

  # CreateInstanceRole:
  #   Type: String
  #   Default: "true"
  #   AllowedValues:
  #     - "true"
  #     - "false"
  #   Description: Create an instance role and profile for Systems Manager access.

  # InstanceType:
  #   Type: String
  #   Default: t3.micro
  #   Description: EC2 instance type.

  EnableNestedStackExample:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Optional nested stack example. Disabled by default to keep the base stack self-contained.

  NestedStackTemplateUrl:
    Type: String
    Default: https://s3.amazonaws.com/cloudformation-templates-us-east-1/S3_Bucket.template
    Description: Public template URL used if the nested stack example is enabled.

  SubnetExportNames:
    Type: String
    Default: webSubnetAZ1SubnetId,webSubnetAZ2SubnetId,webSubnetAZ3SubnetId
    AllowedPattern: "^[A-Za-z0-9,-]+$"
    ConstraintDescription: Provide comma-separated CloudFormation export names only.
    Description: Candidate subnet export names used with Fn::Split and Fn::Select.

  PreferredSubnetIndex:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 2
    Description: Zero-based index of the subnet export name to import.

  Tenancy:
    Type: String
    Default: default
    AllowedValues:
      - default
      - dedicated
    Description: EC2 tenancy for the launched instance.

  ImageId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: SSM parameter path for the AMI to launch.

  KeyName:
    Type: String
    Default: ""
    Description: Optional EC2 key pair name for SSH access.

  SshCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR block allowed to SSH to the instance.

  CustomResourceServiceToken:
    Type: String
    Default: ""
    Description: Lambda ARN used as the ServiceToken for the custom resource example.

  EnableCustomResourceExample:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Optional custom resource example. Disabled by default.


Conditions:
  HasKeyName:
    Fn::Not:
      - Fn::Equals:
          - Ref: KeyName
          - ""

  MonitoringEnabled:
    Fn::Equals:
      - Ref: EnableMonitoring
      - true

  CreateBackupExampleResources:
    Fn::And:
      - Fn::Equals:
          - Ref: CreateBackupResources
          - "true"
      - Fn::Equals:
          - Ref: Environment
          - Prod

  # UseInstanceRole:
  #   Fn::Equals:
  #     - Ref: CreateInstanceRole
  #     - "true"

  UseNestedStackExample:
    Fn::Equals:
      - Ref: EnableNestedStackExample
      - "true"

  UseCustomResourceExample:
    Fn::Equals:
      - Ref: EnableCustomResourceExample
      - "true"

Resources:
