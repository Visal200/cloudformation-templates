  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH access to the EC2 instance
      VpcId:
        Fn::ImportValue: VisalVPCId
      SecurityGroupIngress:
        - Description: SSH access
          IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp:
            Ref: SshCidr
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value:
            Fn::Sub: ${InstanceName}-sg
        - Key: Owner
          Value:
            Ref: Owner

  Ec2Instance:
    Type: AWS::EC2::Instance
    DependsOn:
      - InstanceSecurityGroup
      # - TrainingConfigurationParameter
    # Metadata:
    #   AWS::CloudFormation::Init:
    #     configSets:
    #       default:
    #         - base
    #         - application
    #     base:
    #       packages:
    #         yum:
    #           httpd: []
    #       files:
    #         /etc/cfn/training-info.txt:
    #           content:
    #             Fn::Sub:
    #               - |
    #                 StackName=${AWS::StackName}
    #                 Environment=${Environment}
    #                 Owner=${Owner}
    #                 CostCenter=${CostCenter}
    #                 Region=${AWS::Region}
    #                 AccountId=${AWS::AccountId}
    #               - MappedInstanceType:
    #                   Fn::FindInMap:
    #                     - RegionToInstanceType
    #                     - Ref: AWS::Region
    #                     - InstanceType
    #           mode: "000644"
    #           owner: root
    #           group: root
    #     application:
    #       files:
    #         /var/www/html/index.html:
    #           content:
    #             Fn::Sub:
    #               - |
    #                 <html>
    #                 <body>
    #                 <p>Environment: ${Environment}</p>
    #                 <p>Stack: ${AWS::StackName}</p>
    #                 <p>Stack ID: ${AWS::StackId}</p>
    #                 <p>Account: ${AWS::AccountId}</p>
    #                 <p>Region: ${AWS::Region}</p>
    #                 <p>Partition: ${AWS::Partition}</p>
    #                 <p>URL Suffix: ${AWS::URLSuffix}</p>
    #                 </body>
    #                 </html>
    #               - MappedInstanceType:
    #                   Fn::FindInMap:
    #                     - RegionToInstanceType
    #                     - Ref: AWS::Region
    #                     - InstanceType
    #                 # ConfigParameterName:
    #                 #   Ref: TrainingConfigurationParameter
    #           mode: "000644"
    #           owner: root
    #           group: root
    #       commands:
    #         01-enable-httpd:
    #           command: systemctl enable httpd
    #         02-restart-httpd:
    #           command: systemctl restart httpd
    # CreationPolicy:
    #   ResourceSignal:
    #     Count: 1
    #     Timeout: PT15M
    Properties:
      ImageId:
        Ref: ImageId
      InstanceType:
        Fn::FindInMap:
          - RegionToInstanceType
          - Ref: AWS::Region
          - InstanceType
      Tenancy:
        Ref: Tenancy
      KeyName:
        Fn::If:
          - HasKeyName
          - Ref: KeyName
          - Ref: AWS::NoValue
      # SubnetId:
      #   Fn::ImportValue: webSubnetAZ1SubnetId
      SubnetId:
        Fn::ImportValue:
          Fn::Select:
            - Ref: PreferredSubnetIndex
            - Fn::Split:
                - ","
                - Ref: SubnetExportNames
      SecurityGroupIds:
        - Ref: InstanceSecurityGroup
      Tags:
        - Key: Name
          Value:
            Fn::Sub: ${InstanceName}-${AWS::AccountId}-${AWS::Region}
        - Key: Owner
          Value:
            Ref: Owner
      Monitoring:
        Fn::If:
          - MonitoringEnabled
          - true
          - false
      # UserData:
      #   Fn::Base64:
      #     Fn::Sub:
      #       - |
      #         #!/bin/bash
      #         set -euxo pipefail
      #         hostnamectl set-hostname ${InstanceName}-${Environment}
      #         export APP_SECRET='{{resolve:secretsmanager:${TrainingSecretId}:SecretString:password}}'
      #         /opt/aws/bin/cfn-init -v --stack ${AWS::StackName} --resource Ec2Instance --region ${AWS::Region} --configsets default
      #         /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource Ec2Instance --region ${AWS::Region}
      #       - TrainingSecretId:
      #           Ref: TrainingAppSecret

  TrainingNestedStack:
    Type: AWS::CloudFormation::Stack
    Condition: UseNestedStackExample
    Properties:
      TemplateURL:
        Ref: NestedStackTemplateUrl
      TimeoutInMinutes: 10
      Tags:
        - Key: ParentStack
          Value:
            Ref: AWS::StackName
        - Key: ManagedBy
          Value: CloudFormation

  TrainingCustomResource:
    Type: Custom::TrainingExample
    Condition: UseCustomResourceExample
    Properties:
      ServiceToken:
        Ref: CustomResourceServiceToken
      RequestContext:
        Fn::Sub: ${AWS::StackName}-${AWS::Region}-${Environment}

#Mappings Added
Mappings:
  RegionToInstanceType:
    ap-southeast-2:
      InstanceType: t3.micro

Rules:
  ProductionRequiresBackupExample:
    Assertions:
      - Assert:
          Fn::Or:
            - Fn::Not:
                - Fn::Equals:
                    - Ref: Environment
                    - Prod
            - Fn::Equals:
                - Ref: CreateBackupResources
                - "true"
        AssertDescription: Production deployments must enable the backup example.

  NestedStackUrlRequiredWhenEnabled:
    Assertions:
      - Assert:
          Fn::Or:
            - Fn::Equals:
                - Ref: EnableNestedStackExample
                - "false"
            - Fn::Not:
                - Fn::Equals:
                    - Ref: NestedStackTemplateUrl
                    - ""
        AssertDescription: Provide a nested stack template URL when the nested stack example is enabled.

  CustomResourceTokenRequiredWhenEnabled:
    Assertions:
      - Assert:
          Fn::Or:
            - Fn::Equals:
                - Ref: EnableCustomResourceExample
                - "false"
            - Fn::Not:
                - Fn::Equals:
                    - Ref: CustomResourceServiceToken
                    - ""
        AssertDescription: Provide a Lambda service token ARN when the custom resource example is enabled.

Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value:
      Ref: Ec2Instance
    Export:
      Name:
        Fn::Sub: ${AWS::StackName}-InstanceId

  PrivateIp:
    Description: Private IP address of the EC2 instance
    Value:
      Fn::GetAtt:
        - Ec2Instance
        - PrivateIp

  SecurityGroupId:
    Description: Security group attached to the EC2 instance
    Value:
      Ref: InstanceSecurityGroup

  Region:
    Description: AWS region used for the deployment
    Value:
      Ref: AWS::Region

  AccountId:
    Description: AWS account where stack is deployed
    Value:
      Ref: AWS::AccountId

  AvailableAzs:
    Description: Comma-separated list of availability zones in the region
    Value:
      Fn::Join:
        - ","
        - Fn::GetAZs: ""

  Partition:
    Description: AWS partition used for ARN construction
    Value:
      Ref: AWS::Partition

  StackId:
    Description: AWS Stack id
    Value:
      Ref: AWS::StackId

  StackName:
    Description: AWS Stack Name
    Value:
      Ref: AWS::StackName

  ImportedSubnetExportName:
    Description: Subnet export name selected through Split and Select
    Value:
      Fn::Select:
        - Ref: PreferredSubnetIndex
        - Fn::Split:
            - ","
            - Ref: SubnetExportNames

  TrainingSecretArn:
    Description: ARN of the secret used for the dynamic reference example
    Value:
      Ref: TrainingAppSecret

  # TrainingConfigurationParameterName:
  #   Description: Name of the example SSM parameter created by the stack
  #   Value:
  #     Ref: TrainingConfigurationParameter
